<style>

}

<body>
<div class="help">DIRIS Lima Centro · Ponle el Pare al Sarampión</div>

<div class="desktop-layout">
  <aside class="side-art left-art" style="padding:0;background:none;border:none;box-shadow:none">
    <img src="./Popup-Saram-1.jpg" class="side-promo">

<audio id="bgMusic" src="./musica-sarampion.mp3" preload="auto" loop></audio>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;

// ===============================
// AUDIO DEL JUEGO - VERSIÓN CORREGIDA
// Debe existir este archivo en la misma carpeta del HTML:
// musica-sarampion.mp3
// ===============================
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 0.55;

let audioCtx = null;
let audioUnlocked = false;

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
  audioUnlocked = true;
}

async function startMusic(){
  ensureAudio();

  try{
    bgMusic.muted = false;
    bgMusic.volume = 0.55;

    // Solo reproduce si está pausada, así no se reinicia ni se corta.
    if(bgMusic.paused){
	bgMusic.currentTime = 26;
      await bgMusic.play();
    }

    console.log('🎵 Música sonando');
  }catch(err){
    console.log('❌ Error al reproducir música:', err);
  }
}

function stopMusic(){
  try{
    bgMusic.pause();
    bgMusic.currentTime = 0;
  }catch(e){}
}

function lowerMusic(){
  try{
    bgMusic.volume = 0.25;
  }catch(e){}
}

function sfx(type){
  ensureAudio();

  if(!audioCtx) return;

  const now = audioCtx.currentTime;

  // Pequeño ducking: baja la música por un instante para que el efecto se escuche.
  try{
    const originalVol = 0.55;
    bgMusic.volume = 0.32;
    setTimeout(()=>{ if(state==='playing') bgMusic.volume = originalVol; }, 140);
  }catch(e){}

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  let f1=440, f2=220, dur=.15, wave='sine', vol=.22, filterFreq=1600;

  // Disparo: más agudo y fuerte
  if(type==='shoot'){ f1=980; f2=520; dur=.10; wave='square'; vol=.20; filterFreq=2600; }

  // Impacto: golpe corto
  if(type==='hit'){ f1=220; f2=70; dur=.16; wave='sawtooth'; vol=.24; filterFreq=1200; }

  // Power-up vacuna
  if(type==='power'){ f1=560; f2=1180; dur=.28; wave='triangle'; vol=.25; filterFreq=2800; }

  // Jefe / virus grande
  if(type==='boss'){ f1=110; f2=45; dur=.50; wave='sawtooth'; vol=.28; filterFreq=900; }

  // Ganar
  if(type==='win'){ f1=720; f2=1280; dur=.55; wave='triangle'; vol=.26; filterFreq=3000; }

  // Perder
  if(type==='lose'){ f1=260; f2=80; dur=.55; wave='sawtooth'; vol=.26; filterFreq=900; }

  osc.type = wave;
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(filterFreq, now);

  osc.frequency.setValueAtTime(f1, now);
  osc.frequency.exponentialRampToValueAtTime(Math.max(40,f2), now+dur);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(vol, now+.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);

  osc.start(now);
  osc.stop(now+dur+.04);
}

function sfxWin(){
  sfx('win');
  setTimeout(()=>sfx('power'),120);
  setTimeout(()=>sfx('shoot'),240);
}

function sfxLose(){
  sfx('lose');
  setTimeout(()=>sfx('hit'),140);
}

function load(src){const i=new Image();i.src=src;return i;}
const img={
	
  logoMinisterio:load('logo-ministerio.png'),
  logoDiris:load('logo-minsa-2.png'),
	
  iconVacuna:load('icon1.png'),
  iconBrigada:load('icon2.png'),
  iconVirus:load('icon3.png'),
	
  D1:load('D1.png'),D2:load('D2.png'),D3:load('D3.png'),D4:load('D4.png'),
  f1:load('f1.png'),f2:load('f2.png'),f3:load('f3.png'),h1:load('h1.png'),j1:load('j1.png'),
  jugar:load('btn-mision2.png'),logoMinsa:load('logo-minsa-2.png'),logo:load('logo-saram.png'),mapa:load('mapa-diris-lc.png'),j2:load('j2.png'),
  popup1:load('popup1.jpg'),popup2:load('popup2.jpg'),popup3:load('popup3.jpg'),popup4:load('popup4.jpg'),popup5:load('popup5.jpg'),
  pre1:load('pre1.png'),v1:load('v-1.png'),v2:load('v-2.png'),v3:load('v3.png'),vacu:load('vacu.png'),volver:load('volver_jugar.png'),x2:load('x2.png')
};
const popupImgs=[img.popup1,img.popup2,img.popup3,img.popup4,img.popup5];
const distritos=['San Luis','San Borja','San Isidro','Miraflores','Pueblo Libre','Jesús María','La Victoria','San Juan de Lurigancho','Cercado de Lima','Breña','Magdalena','San Miguel','Lince','Surquillo'];

let state='cover';
let player={x:W/2,y:H-160,w:135,h:135,targetX:W/2,hp:3};
let bullets=[],enemies=[],particles=[],floats=[],hitEffects=[],shotEffects=[];
let popup=null,boss=null,bossSpawned=false,bossDefeated=false,keys={};
let shareMsgTimer=0;
let score=0,level=1,distritoIndex=0,wonDistricts=0,timeLeft=60,shield=0,x2Timer=0,powerMode=0,comboTimer=0,comboCount=0,scoreAnim=0,lastShot=0,last=performance.now();

function rand(a,b){return a+Math.random()*(b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function di(im,x,y,w,h){if(im&&im.complete&&im.naturalWidth){ctx.drawImage(im,x,y,w,h);return true}return false}
function diContain(im,cx,cy,maxW,maxH){
  if(!(im&&im.complete&&im.naturalWidth))return false;
  const r=im.naturalWidth/im.naturalHeight;
  let w=maxW,h=w/r;
  if(h>maxH){h=maxH;w=h*r;}
  ctx.drawImage(im,cx-w/2,cy-h/2,w,h);
  return true;
}
function button(x,y,w,h,t,c){ctx.fillStyle='rgba(0,0,0,.18)';rr(x,y+5,w,h,18);ctx.fill();ctx.fillStyle=c;rr(x,y,w,h,18);ctx.fill();ctx.fillStyle='rgba(255,255,255,.24)';rr(x,y,w,h/2,18);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 19px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x+w/2,y+h/2);ctx.textBaseline='alphabetic'}
function wrapText(text,cx,y,maxw,lh){const words=text.split(' ');let line='',yy=y;for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>maxw&&line){ctx.fillText(line.trim(),cx,yy);line=word+' ';yy+=lh}else line=test}ctx.fillText(line.trim(),cx,yy)}
function addFloat(t,x,y,c='#064c86',s=20){floats.push({t,x,y,c,s,life:1,max:1})}
function burst(x,y,c='#ff4fa0',n=12){for(let i=0;i<n;i++)particles.push({x,y,vx:rand(-150,150),vy:rand(-180,120),r:rand(2,6),life:rand(.35,.85),max:.85,c})}

function getRank(value){
  if(value>=6000)return {name:'INMUNIDAD MÁXIMA',color:'#ffcf33',sub:'¡Pusiste el pare al sarampión!'};
  if(value>=3500)return {name:'ESCUDO VACUNA',color:'#b627d8',sub:'¡Tu escudo está fuerte!'};
  if(value>=1500)return {name:'MEGA PROTECTOR',color:'#1976d2',sub:'¡Sigues protegiendo!'};
  return {name:'CAZAVIRUS',color:'#20b8d0',sub:'¡Buen inicio, sigue jugando!'};
}
function shareText(){
  const r=getRank(score);
  return `¡Logré ${score} puntos y desbloqueé el rango ${r.name} en Ponle el Pare al Sarampión! ¿Puedes superarme? #PonleElPareAlSarampión #DIRISLimaCentro`;
}
async function shareScore(){
  const text=shareText();
  try{
    if(navigator.share){
      await navigator.share({title:'Ponle el Pare al Sarampión',text});
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(text);
      shareMsgTimer=2.4;
    }else{
      shareMsgTimer=2.4;
    }
  }catch(e){}
}


function clearGame(){bullets=[];enemies=[];particles=[];floats=[];hitEffects=[];shotEffects=[];boss=null;bossSpawned=false;bossDefeated=false;popup=null;shield=0;x2Timer=0;powerMode=0;comboTimer=0;comboCount=0;shareMsgTimer=0;player.x=W/2;player.targetX=W/2;last=performance.now()}
function resetAll(){state='cover';score=0;timeLeft=60;level=1;distritoIndex=0;wonDistricts=0;player.hp=3;stopMusic();clearGame()}
function startGame(){
score=0;
timeLeft=60;
level=1;
distritoIndex=0;
wonDistricts=0;
player.hp=3;
clearGame();
state='playing';

// AQUÍ EMPIEZA LA CANCIÓN DEL JUEGO
startMusic();
sfx('power');
}
function endGame(){
if(state==='end')return;
state='end';
scoreAnim=0;
boss=null;
enemies=[];
bullets=[];
if(player.hp>0){sfxWin();}else{sfxLose();}
lowerMusic();
}
function shoot(){if(state!=='playing'||popup)return;const now=performance.now();if(now-lastShot<150)return;lastShot=now;sfx('shoot');const shots=powerMode>0?[-30,0,30]:[-16,16];shots.forEach(offset=>{bullets.push({x:player.x+offset,y:player.y+22,vy:-760,r:18,spin:0,trail:[]});shotEffects.push({x:player.x+offset,y:player.y+38,life:.28,max:.28,size:70})});burst(player.x,player.y+35,'#20b8d0',8);burst(player.x,player.y+35,'#ff4fa0',5)}
function spawnEnemy(){let type=Math.random()>.72?'virus2':'virus1';if(Math.random()>.94)type='power';enemies.push({type,x:rand(55,W-55),y:-70,vx:rand(-55,55),vy:rand(120,195),r:type==='virus2'?32:28})}
function spawnBoss(){
  bossSpawned=true;
  boss={
    x:W/2,
    y:215,
    baseY:215,
    hp:40,
    max:40,
    phase:0,
    intro:1
  };
}

function goToBigVirus(){
  state='playing';
  popup=null;
  bullets=[];
  enemies=[];
  boss=null;
  bossSpawned=false;
  timeLeft=18;
  if(player.hp<=0)player.hp=3;
  player.x=W/2;
  player.targetX=W/2;
  spawnBoss();
  sfx('boss');addFloat('¡VIRUS GRANDE!',W/2,210,'#ff4fa0',30);
}


function update(dt){
 if(shareMsgTimer>0)shareMsgTimer=Math.max(0,shareMsgTimer-dt);
 if(state==='end'&&scoreAnim<score)scoreAnim+=Math.ceil((score-scoreAnim)/10);
 shield=Math.max(0,shield-dt);x2Timer=Math.max(0,x2Timer-dt);powerMode=Math.max(0,powerMode-dt);comboTimer=Math.max(0,comboTimer-dt);if(comboTimer<=0)comboCount=0;
 particles=particles.filter(p=>(p.life-=dt)>0);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=160*dt});
 floats=floats.filter(f=>(f.life-=dt)>0);floats.forEach(f=>{f.y-=42*dt});
 hitEffects=hitEffects.filter(f=>(f.life-=dt)>0);shotEffects=shotEffects.filter(f=>(f.life-=dt)>0);
 if(state!=='playing'||popup)return;
 if(keys.ArrowLeft||keys.a)player.targetX-=420*dt;if(keys.ArrowRight||keys.d)player.targetX+=420*dt;
 player.targetX=clamp(player.targetX,70,W-70);player.x+=(player.targetX-player.x)*.15;timeLeft-=dt;
 if(timeLeft<=18&&!bossSpawned&&!bossDefeated)spawnBoss();if(Math.random()<.03)spawnEnemy();
 bullets.forEach(b=>{b.trail.push({x:b.x,y:b.y,life:.22,max:.22});if(b.trail.length>8)b.trail.shift();b.y+=b.vy*dt;b.spin+=dt*10;b.trail=b.trail.filter(p=>(p.life-=dt)>0)});bullets=bullets.filter(b=>b.y>-80);
 enemies.forEach(e=>{e.x+=e.vx*dt;e.y+=e.vy*dt;if(e.x<30||e.x>W-30)e.vx*=-1});
 for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.hypot(b.x-e.x,b.y-e.y)<42){bullets.splice(i,1);enemies.splice(j,1);comboTimer=2.2;comboCount++;let pts=x2Timer>0?40:20;if(comboCount>=5)pts*=2;score+=pts;addFloat('+'+pts,e.x,e.y,'#ffcf33',24);if(comboCount>=5)addFloat('RÁFAGA VACUNA',W/2,170,'#ff4fa0',30);sfx('hit');hitEffects.push({x:e.x,y:e.y,life:.42,max:.42});burst(e.x,e.y,'#ff4fa0',14);break}}}
 if(boss){
   boss.phase+=dt;
   boss.intro=Math.max(0,boss.intro-dt*1.8);

   // Movimiento del jefe: izquierda/derecha + flotación
   boss.x=W/2+Math.sin(boss.phase*1.35)*78;
   boss.y=boss.baseY+Math.sin(boss.phase*2.4)*12;

   // El jefe lanza virus pequeños cada cierto tiempo
   if(Math.random()<.018){
     enemies.push({
       type:'virus2',
       x:boss.x+rand(-60,60),
       y:boss.y+78,
       vx:rand(-50,50),
       vy:rand(140,210),
       r:30
     });
   }

   for(let i=bullets.length-1;i>=0;i--){
     if(!boss) break;
     const b=bullets[i];
     if(Math.hypot(b.x-boss.x,b.y-boss.y)<95){
       bullets.splice(i,1);
       boss.hp--;
       score+=5;
       hitEffects.push({x:b.x,y:b.y,life:.35,max:.35});
       burst(b.x,b.y,'#ff4fa0',8);
       if(boss.hp<=0){
         score+=500;
         bossDefeated=true;
         sfxWin();
         addFloat('¡BROTE DETENIDO!',W/2,210,'#ffcf33',28);
         burst(W/2,220,'#ffcf33',28);
         boss=null;
         break;
       }
     }
   }
 }
 for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(Math.hypot(player.x-e.x,player.y-e.y)<80){enemies.splice(i,1);if(e.type!=='power'&&shield<=0){player.hp--;sfx('hit');addFloat('¡CUIDADO!',player.x,player.y,'#ff4fa0',24)}else{shield=6;x2Timer=7;powerMode=6;player.hp=Math.min(5,player.hp+1);sfx('power');addFloat('VACUNA SPR',player.x,player.y,'#20b8d0',24);burst(player.x,player.y,'#20b8d0',18);burst(player.x,player.y,'#ff4fa0',12)}if(player.hp<=0){player.hp=0;endGame();return;}}}
 if(timeLeft<=0){endGame();return;}
}

function drawBase(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#e9fbff');g.addColorStop(.6,'#fff');g.addColorStop(1,'#dff6ff');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#1bb6cf';ctx.beginPath();ctx.arc(-10,45,100,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff4fa0';ctx.beginPath();ctx.arc(W+10,25,110,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(190,50,220,.95)';ctx.fillRect(0,H-78,W,78);ctx.fillStyle='rgba(255,255,255,.95)';rr(16,108,W-32,H-198,24);ctx.fill()}
function drawCover(){
 const t=performance.now();

 // Fondo general
 const g=ctx.createLinearGradient(0,0,0,H);
 g.addColorStop(0,'#dff8ff');
 g.addColorStop(.55,'#ffffff');
 g.addColorStop(1,'#cfeeff');
 ctx.fillStyle=g;
 ctx.fillRect(0,0,W,H);

 // Formas institucionales
 ctx.save();
 ctx.translate(Math.sin(t/900)*6,Math.cos(t/850)*5);
 ctx.fillStyle='#20b8d0';
 ctx.beginPath();ctx.arc(-18,42,108,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#ff4fa0';
 ctx.beginPath();ctx.arc(W+20,35,118,0,Math.PI*2);ctx.fill();
 ctx.restore();

 // Partículas suaves
 for(let i=0;i<22;i++){
   const x=(i*49+t*.025)%W;
   const y=82+((i*57+t*.035)%(H-175));
   ctx.globalAlpha=.08+(i%4)*.018;
   ctx.fillStyle=i%2?'#20b8d0':'#ff4fa0';
   ctx.beginPath();ctx.arc(x,y,2.2+(i%3),0,Math.PI*2);ctx.fill();
 }
 ctx.globalAlpha=1;

 // Tarjeta principal mejor diagramada
 ctx.save();
 ctx.shadowColor='rgba(6,76,134,.24)';
 ctx.shadowBlur=28;
 ctx.shadowOffsetY=12;
 ctx.fillStyle='rgba(255,255,255,.97)';
 rr(30,76,W-60,690,30);
 ctx.fill();
 ctx.restore();
 ctx.strokeStyle='rgba(32,184,208,.25)';
 ctx.lineWidth=3;
 rr(30,76,W-60,690,30);
 ctx.stroke();

 ctx.textAlign='center';

 // Logo superior
 ctx.save();
 ctx.translate(W/2,118);
 ctx.scale(1+Math.sin(t/420)*.03,1+Math.sin(t/420)*.03);
 diContain(img.logo,0,0,288,108);
 ctx.restore();

 // Titular de juego, sin salirse del marco
 ctx.save();
 ctx.shadowColor='rgba(6,76,134,.18)';
 ctx.shadowBlur=5;
 ctx.fillStyle='#1976d2';
 ctx.font='900 19px Arial';
 ctx.font='900 18px Arial';
 ctx.fillText('¡JUEGA, APRENDE',W/2,182);
 ctx.fillText('Y PROTÉGETE!',W/2,208);
 ctx.restore();

 // ===============================
// FRANJA EDUCATIVA CORREGIDA
// ===============================

// Más alto y con aire para que los textos no choquen con los íconos
const eduY=218;
const eduX=56;
const eduW=318;
const eduH=82;

// Caja soporte principal
ctx.save();
ctx.shadowColor='rgba(6,76,134,.10)';
ctx.shadowBlur=12;
ctx.shadowOffsetY=5;
ctx.fillStyle='rgba(255,255,255,.98)';

 bullets.forEach(b=>{

 });

 ctx.fillStyle='rgba(190,50,220,.95)';ctx.fillRect(0,H-78,W,78);

function drawPopup(){if(!popup)return;ctx.fillStyle='rgba(0,0,0,.42)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';rr(45,112,W-90,560,26);ctx.fill();ctx.textAlign='center';ctx.fillStyle='#ff4fa0';ctx.font='bold 28px Arial';ctx.fillText(popup.title,W/2,158);if(popup.image&&popup.image.complete&&popup.image.naturalWidth){const maxW=210,maxH=330,ratio=popup.image.naturalWidth/popup.image.naturalHeight;let dw=maxW,dh=dw/ratio;if(dh>maxH){dh=maxH;dw=dh*ratio}ctx.drawImage(popup.image,W/2-dw/2,178,dw,dh)}ctx.fillStyle='#124366';ctx.font='18px Arial';wrapText(popup.text,W/2,535,300,24);button(W/2-105,590,210,54,popup.btn,'#064c86');ctx.textAlign='left'}
function render(){ctx.clearRect(0,0,W,H);if(state==='cover')drawCover();else if(state==='playing')drawPlaying();else drawEnd();drawPopup()}
function loop(ts){
  const dt=Math.min(.033,(ts-last)/1000);
  last=ts;
  try{
    update(dt);
    render();
  }catch(err){
    console.log('Error controlado en loop:', err);
    state='end';
    render();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function getPos(e){const r=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)}}
function press(x,y){
 ensureAudio();
 
 if(popup){
   if(x>W/2-105&&x<W/2+105&&y>590&&y<644)popup=null;
   return;
 }
 if(state==='cover'){
   if(x>35&&x<395&&y>620&&y<770)startGame();
   return;
 }
 if(state==='end'){
   if(x>58&&x<372&&y>580&&y<628){shareScore();return}
   if(x>58&&x<372&&y>640&&y<688){downloadResult();return}
   if(x>106&&x<324&&y>702&&y<742){resetAll();return}
   return;
 }
 player.targetX=x;
 shoot();
}
canvas.addEventListener('pointerdown',e=>{const p=getPos(e);press(p.x,p.y)});canvas.addEventListener('pointermove',e=>{const p=getPos(e);if(state==='playing')player.targetX=p.x});canvas.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e);if(state==='playing'){player.targetX=p.x;shoot()}},{passive:false});
window.addEventListener('keydown',e=>{
 ensureAudio();
 keys[e.key]=true;
 if(e.key==='0')resetAll();
 if(e.key==='1')startGame();
 if(e.key==='2'){score=6000;endGame()}
 if(e.key==='3'){player.hp=0;endGame()}
 if(e.key==='4'){score=9999;player.hp=3;endGame()}
 if(e.key==='5')popup={title:'Vacunación activa',text:'Acude al establecimiento de salud más cercano.',btn:'SEGUIR',image:popupImgs[1],goMap:false};
 if(e.key==='6'||e.key.toLowerCase()==='b')goToBigVirus();
 if(e.key==='7'){score+=1500;addFloat('+1500',W/2,210,'#ffcf33',28)}
 if(e.key==='8'){player.hp=5;shield=10;x2Timer=10;powerMode=10}
 if(e.key==='9')score+=5000;
 if(e.key.toLowerCase()==='s'&&state==='end')shareScore();
 if(e.key===' ')shoot();
});
window.addEventListener('keyup',e=>keys[e.key]=false);
