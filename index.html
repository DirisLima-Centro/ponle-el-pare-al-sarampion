<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Diky vs Zancudo ULTRA PRO</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#dff4ff;
    font-family:Arial,Helvetica,sans-serif
  }
  #wrap{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px
  }
  canvas{
    width:min(100vw - 20px,430px);
    height:min(100vh - 20px,780px);
    max-height:97vh;
    border-radius:24px;
    box-shadow:0 18px 50px rgba(0,0,0,.22);
    background:#cfefff;
    touch-action:none;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="430" height="780"></canvas></div>
<audio id="bgm" src="Alerta_Dengue.mp3" loop preload="auto"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const bg = new Image(); bg.src = "fondo.png";
const dikyShoot = new Image(); dikyShoot.src = "D1.png";
const dikyIdle = new Image(); dikyIdle.src = "D2.png";
const mosquitoImg = new Image(); mosquitoImg.src = "mosquito.png";
const mosquitoBlue = new Image(); mosquitoBlue.src = "mosquito2.png";
const mosquitoRed = new Image(); mosquitoRed.src = "mosquito3.png";
const hudPanel = new Image(); hudPanel.src = "j1.png";
const startBtnImg = new Image(); startBtnImg.src = "jugar.png";
const comboImg = new Image(); comboImg.src = "pre1.png";
const shieldImg = new Image(); shieldImg.src = "v1.png";
const freezeImg = new Image(); freezeImg.src = "h1.png";
const x2Img = new Image(); x2Img.src = "x2.png";
const spray1Img = new Image(); spray1Img.src = "f1.png";
const spray2Img = new Image(); spray2Img.src = "f2.png";
const boomImg = new Image(); boomImg.src = "f3.png";
const logoDiris = new Image(); logoDiris.src = "logo-minsa-2.png";
const dikyLose = new Image(); 
dikyLose.src = "D3.png";   // diky triste

const dikyHero = new Image(); 
dikyHero.src = "D4.png";   // diky héroe	
const bgm = document.getElementById("bgm");

let state = "start";
let score = 0, timeLeft = 60, combo = 0, bestCombo = 0, level = 1;
let last = 0, spawnTimer = 0, shootTimer = 0, bossSpawned = false;
let player = {x: W/2, y: H-165, w: 150, h: 165, targetX: W/2, hp: 3};
let bullets = [], enemies = [], particles = [], floats = [], pickups = [];
let boss = null;
let shake = 0, bgPan = 0, comboFlash = 0, shieldFx = 0, freezeTimer = 0, x2Timer = 0;
let keys = {};
let audioCtx = null;

function getAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function beep(type, f1, f2, dur, vol){
  const ac = getAudio();
  if(!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f1, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2, ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur);
}

const sfxShoot = ()=>beep("square",800,280,0.08,0.03);
const sfxHit   = ()=>beep("triangle",260,700,0.12,0.05);
const sfxBad   = ()=>beep("sawtooth",180,90,0.18,0.035);
const sfxBoss  = ()=>beep("sawtooth",110,60,0.4,0.06);
const sfxPower = ()=>beep("triangle",520,920,0.15,0.05);

function startMusic(){
  bgm.volume = 0.55;
  bgm.play().catch(()=>{});
}

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function rand(a,b){ return a + Math.random() * (b-a); }

function addFloat(text,x,y,color,size=22){
  floats.push({text,x,y,color,size,life:0.8});
}

function burst(x,y,color,n=12){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:rand(-180,180),
      vy:rand(-180,180),
      r:rand(2,7),
      life:rand(0.3,0.9),
      max:rand(0.3,0.9),
      color
    });

  }
}

function addPickup(kind,x,y){
  pickups.push({kind,x,y,vy:110,r:28,wobble:rand(0,Math.PI*2)});
}

function resetGame(){
  state = "playing";
  score = 0;
  timeLeft = 60;
  combo = 0;
  bestCombo = 0;
  level = 1;
  spawnTimer = 0;
  shootTimer = 0;
  bossSpawned = false;
  shake = 0;
  comboFlash = 0;
  bullets = [];
  enemies = [];
  particles = [];
  floats = [];
  pickups = [];
  boss = null;
  player.x = W/2;
  player.targetX = W/2;
  player.hp = 3;
  shieldFx = 0;
  freezeTimer = 0;
  x2Timer = 0;
  last = performance.now();
  startMusic();
}

function shoot(){
  if(state !== "playing" || shootTimer > 0) return;
  bullets.push({x:player.x-24,y:player.y+42,vy:-700,r:11,img:Math.random()<0.5?spray1Img:spray2Img});
  bullets.push({x:player.x+28,y:player.y+36,vy:-700,r:11,img:Math.random()<0.5?spray1Img:spray2Img});
  shootTimer = 0.16;
  sfxShoot();
}

function spawnEnemy(){
  const t = Math.random();
  let kind = "zancudo";
  if(t < 0.14) kind = "agua";
  if(t > 0.94) kind = "bonus";
  if(t > 0.80 && t <= 0.94) kind = "freeze";

  enemies.push({
    kind,
    sprite: kind === "zancudo" ? (Math.random()<0.5 ? mosquitoBlue : mosquitoRed) : null,
    x: rand(35, W-35),
    y: -40,
    vx: rand(-70,70),
    vy: rand(120 + level*14, 185 + level*18),
    hp: kind === "zancudo" ? (Math.random()<0.28 ? 2 : 1) : 1,
    r: kind === "zancudo" ? 24 : 22,
    wobble: rand(0,Math.PI*2)
  });
}

function spawnBoss(){
  bossSpawned = true;
  boss = {
    x:W/2,
    y:-110,
    targetY:140,
    hp:60,
    maxHp:60,
    phase:0,
    spawnTimer:0.9,
    r:76,
    sprite:mosquitoImg
  };
  addFloat("¡JEFE FINAL!",W/2,280,"#d64545",34);
  sfxBoss();
}

function applyEnemyDeath(e){
  if(e.kind === "zancudo"){
    let plus = 12 + Math.min(combo*2,20);
    if(x2Timer > 0) plus *= 2;
    score += plus;
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    addFloat("+"+plus,e.x,e.y,"#2f9e44");
    burst(e.x,e.y,"#2f9e44",16);
    sfxHit();
    if(combo >= 5) comboFlash = 0.9;
    if(Math.random() < 0.10) addPickup("shield", e.x, e.y);
    if(Math.random() < 0.08) addPickup("x2", e.x, e.y);
  }else if(e.kind === "bonus"){
    score += 35;
    timeLeft = Math.min(60,timeLeft+4);
    addFloat("+35",e.x,e.y,"#ffb703",26);
    addFloat("+4s",e.x+22,e.y-18,"#ffb703",22);
    burst(e.x,e.y,"#ffb703",18);
    sfxHit();
  }else if(e.kind === "freeze"){
    addPickup("freeze", e.x, e.y);
    addFloat("HIELO",e.x,e.y,"#13a3b8",22);
    burst(e.x,e.y,"#13a3b8",16);
    sfxPower();
  }else{
    score = Math.max(0, score-12);
    combo = 0;
    addFloat("-12",e.x,e.y,"#d64545");
    burst(e.x,e.y,"#d64545",14);
    sfxBad();
  }
  shake = 6;
}

function rankName(){
  if(score >= 850) return "Brigadista DIRIS Legendario";
  if(score >= 600) return "Brigadista DIRIS Élite";
  if(score >= 350) return "Brigadista DIRIS";
  if(score >= 180) return "Protector de SJL";
  return "Aprendiz Anti Dengue";
}

function update(dt){
  bgPan += dt*26;
  shootTimer = Math.max(0, shootTimer-dt);
  shake = Math.max(0, shake-dt*20);
  comboFlash = Math.max(0, comboFlash-dt);
  shieldFx = Math.max(0, shieldFx-dt);
  freezeTimer = Math.max(0, freezeTimer-dt);
  x2Timer = Math.max(0, x2Timer-dt);

  particles = particles.filter(p => (p.life-=dt) > 0);
  for(const p of particles){
    p.x += p.vx*dt;
    p.y += p.vy*dt;
    p.vx *= 0.98;
    p.vy *= 0.98;
  }

  floats = floats.filter(f => (f.life-=dt) > 0);
  for(const f of floats){
    f.y -= 40*dt;
  }

  if(state !== "playing") return;

  level = 1 + Math.floor((60-timeLeft)/12);

  if(keys["ArrowLeft"] || keys["a"] || keys["A"]) player.targetX -= 360*dt;
  if(keys["ArrowRight"] || keys["d"] || keys["D"]) player.targetX += 360*dt;
  player.targetX = clamp(player.targetX,70,W-70);
  player.x += (player.targetX - player.x) * Math.min(1, dt*11);

  if(keys[" "] || keys["Spacebar"]) shoot();

  spawnTimer -= dt;
  const rateBase = boss ? 0.65 : Math.max(0.20, 0.54 - level*0.05);
  const rate = freezeTimer > 0 ? rateBase*1.4 : rateBase;

  if(spawnTimer <= 0){
    spawnEnemy();
    if(Math.random() < 0.25 + level*0.08) spawnEnemy();
    spawnTimer = rate;
  }

  if(!bossSpawned && timeLeft <= 18) spawnBoss();

  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.y += b.vy*dt;
    if(b.y < -18){
      bullets.splice(i,1);
      continue;
    }

    let hit = false;

    for(let j=enemies.length-1;j>=0;j--){
      const e = enemies[j];
      if(Math.hypot(b.x-e.x, b.y-e.y) < b.r + e.r){
        bullets.splice(i,1);
        hit = true;
        e.hp--;
        burst(b.x,b.y,"#13a3b8",6);
        if(e.hp <= 0){
          applyEnemyDeath(e);
          enemies.splice(j,1);
        } else {
          sfxHit();
        }
        break;
      }
    }
    if(hit) continue;

    if(boss && Math.hypot(b.x-boss.x,b.y-boss.y) < b.r + boss.r*0.78){
      bullets.splice(i,1);
      boss.hp--;
      addFloat("-1",boss.x+rand(-28,28),boss.y+rand(-20,20),"#734800",18);
      burst(b.x,b.y,"#ffce3a",6);
      sfxHit();
      shake = 4;
      if(boss.hp <= 0){
        let bonus = 220;
        if(x2Timer > 0) bonus *= 2;
        score += bonus;
        addFloat("+"+bonus,boss.x,boss.y,"#ffce3a",32);
        burst(boss.x,boss.y,"#ffce3a",40);
        boss = null;
        sfxBoss();
      }
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.wobble += dt*4;

    if(freezeTimer <= 0 || e.kind !== "zancudo"){
      e.x += e.vx*dt + Math.sin(e.wobble)*38*dt;
      e.y += e.vy*dt;
    }

    if(e.x < 24 || e.x > W-24) e.vx *= -1;

    if(Math.abs(e.x-player.x) < 58 && Math.abs(e.y-(player.y+68)) < 58){
      if(e.kind === "zancudo"){
        if(shieldFx > 0){
          addFloat("ESCUDO",player.x,player.y+18,"#13a3b8",22);
        } else {
          player.hp--;
          combo = 0;
          addFloat("¡OUCH!",player.x,player.y+18,"#d64545",24);
          sfxBad();
        }
      }else if(e.kind === "agua"){
        score = Math.max(0, score-15);
        combo = 0;
        addFloat("-15",player.x,player.y+18,"#d64545",24);
        sfxBad();
      }else if(e.kind === "bonus"){
        score += 20;
        addFloat("+20",player.x,player.y+18,"#ffb703",24);
        sfxHit();
      }else if(e.kind === "freeze"){
        freezeTimer = 4.5;
        addFloat("CONGELADO",player.x,player.y+18,"#13a3b8",24);
        sfxPower();
      }

      burst(e.x,e.y,e.kind==="agua"?"#d64545":"#2f9e44",14);
      enemies.splice(i,1);
      shake = 8;

      if(player.hp <= 0){
        timeLeft = 0;
        state = "end";
      }
      continue;
    }

    if(e.y > H+35){
      if(e.kind === "zancudo") combo = 0;
      enemies.splice(i,1);
    }
  }

  for(let i=pickups.length-1;i>=0;i--){
    const p = pickups[i];
    p.wobble += dt*4;
    p.y += p.vy*dt;
    p.x += Math.sin(p.wobble)*25*dt;

    if(Math.abs(p.x-player.x) < 54 && Math.abs(p.y-(player.y+60)) < 56){
      if(p.kind === "shield"){
        player.hp = Math.min(5, player.hp+1);
        shieldFx = 3.5;
        addFloat("+VIDA",p.x,p.y,"#13a3b8",24);
      }else if(p.kind === "freeze"){
        freezeTimer = 4.5;
        addFloat("HIELO",p.x,p.y,"#13a3b8",24);
      }else if(p.kind === "x2"){
        x2Timer = 6;
        addFloat("X2",p.x,p.y,"#ffb703",26);
      }
      sfxPower();
      pickups.splice(i,1);
      continue;
    }

    if(p.y > H+30) pickups.splice(i,1);
  }

  if(boss){
    boss.phase += dt;
    if(freezeTimer <= 0){
      if(boss.y < boss.targetY) boss.y += 130*dt;
      boss.x = W/2 + Math.sin(boss.phase*1.5)*120;
      boss.spawnTimer -= dt;
      if(boss.spawnTimer <= 0){
        boss.spawnTimer = 1.0;
        enemies.push({
          kind:"zancudo",
          sprite:Math.random()<0.5?mosquitoBlue:mosquitoRed,
          x:boss.x+rand(-42,42),
          y:boss.y+26,
          vx:rand(-90,90),
          vy:rand(180,230),
          hp:1,
          r:24,
          wobble:rand(0,Math.PI*2)
        });
      }
    }
  }

  timeLeft -= dt;
  if(timeLeft <= 0){
    timeLeft = 0;
    state = "end";
  }
}

function rr(x,y,w,h,r,fill=true){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  if(fill) ctx.fill(); else ctx.stroke();
}

function drawBG(){
  if(bg.complete && bg.naturalWidth){
    const scale = H / bg.height;
    const drawW = bg.width * scale;
    const cycle = Math.max(1, drawW - W);
    const sx = (Math.sin(bgPan/90)*0.5 + 0.5) * cycle;
    ctx.drawImage(bg, sx/scale, 0, W/scale, bg.height, 0, 0, W, H);
    ctx.fillStyle = freezeTimer>0 ? "rgba(180,240,255,.18)" : "rgba(255,255,255,.05)";
    ctx.fillRect(0,0,W,H);
  } else {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#eaf8ff");
    g.addColorStop(1,"#b8e0fb");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }
}

function drawHUD(){
  if(hudPanel.complete && hudPanel.naturalWidth){
    ctx.drawImage(hudPanel, 10, 10, 245, 95);
  } else {
    ctx.fillStyle = "rgba(255,255,255,.94)";
    rr(12,12,245,95,18,true);
  }

  ctx.fillStyle = "#fff9d4";
  ctx.font = "bold 24px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(score, 180, 72);
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";

  ctx.fillStyle = "rgba(255,255,255,.9)";
  rr(265,14,153,94,18,true);

  const iconY = 22;
  for(let i=0;i<player.hp;i++){
    if(shieldImg.complete && shieldImg.naturalWidth){
      ctx.drawImage(shieldImg, 276 + i*29, iconY, 25, 25);
    } else {
      ctx.font = "20px Arial";
      ctx.fillText("❤", 278 + i*29, 42);
    }
  }

  ctx.fillStyle = "#14324a";
  ctx.font = "bold 15px Arial";
  ctx.fillText("Nivel: " + level, 276, 62);
  ctx.fillText("Combo: x" + combo, 276, 82);

  if(x2Timer > 0 && x2Img.complete && x2Img.naturalWidth) ctx.drawImage(x2Img, 362, 18, 42, 42);
  if(freezeTimer > 0 && freezeImg.complete && freezeImg.naturalWidth) ctx.drawImage(freezeImg, 362, 60, 42, 42);

  ctx.fillStyle = "#e6f3ff";
  rr(16,108,W-32,14,10,true);
  ctx.fillStyle = timeLeft>18 ? "#13a3b8" : "#d64545";
  rr(16,108,(W-32)*(timeLeft/60),14,10,true);
}

function drawPlayer(){
  const img = state === "playing" ? dikyShoot : dikyIdle;
  const x = player.x - player.w/2;
  const y = player.y;

  if(img.complete && img.naturalWidth){
    ctx.drawImage(img,x,y,player.w,player.h);
  } else {
    ctx.fillStyle = "#0f6cbd";
    rr(x,y,player.w,player.h,18,true);
  }

  if(shieldFx > 0){
    ctx.strokeStyle = "rgba(19,163,184,.95)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(player.x, player.y+82, 70 + Math.sin(performance.now()/120)*3, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawBullets(){
  for(const b of bullets){
    if(b.img.complete && b.img.naturalWidth){
      ctx.drawImage(b.img, b.x-20, b.y-20, 40, 40);
    } else {
      const g = ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,11);
      g.addColorStop(0,"#fff");
      g.addColorStop(.5,"#8cff92");
      g.addColorStop(1,"rgba(140,255,146,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x,b.y,11,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    ctx.save();
    ctx.translate(e.x,e.y);
    const pulse = 1 + Math.sin(e.wobble*2)*0.04;
    ctx.scale(pulse,pulse);

    if(e.kind === "zancudo"){
      const sprite = e.sprite || mosquitoBlue;
      ctx.drawImage(sprite,-e.r-4,-e.r-4,e.r*2+8,e.r*2+8);
    } else if(e.kind === "agua"){
      ctx.drawImage(boomImg,-e.r-10,-e.r-10,e.r*2+20,e.r*2+20);
    } else if(e.kind === "bonus"){
      ctx.drawImage(x2Img,-e.r-6,-e.r-6,e.r*2+12,e.r*2+12);
    } else if(e.kind === "freeze"){
      ctx.drawImage(freezeImg,-e.r-6,-e.r-6,e.r*2+12,e.r*2+12);
    }
    ctx.restore();
  }
}

function drawPickups(){
  for(const p of pickups){
    let img = shieldImg;
    if(p.kind === "freeze") img = freezeImg;
    if(p.kind === "x2") img = x2Img;
    ctx.drawImage(img, p.x-26, p.y-26, 52, 52);
  }
}

function drawBoss(){
  if(!boss) return;
  ctx.save();
  ctx.translate(boss.x,boss.y);
  ctx.drawImage(boss.sprite,-boss.r,-boss.r,boss.r*2,boss.r*2);
  ctx.restore();

  ctx.fillStyle = "rgba(255,255,255,.95)";
  rr(58,128,W-116,20,10,true);
  ctx.fillStyle = "#d64545";
  rr(58,128,(W-116)*(boss.hp/boss.maxHp),20,10,true);
  ctx.fillStyle = "#6a1515";
  ctx.font = "bold 14px Arial";
  ctx.fillText("JEFE FINAL",W/2-38,143);
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = p.life/p.max;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFloats(){
  for(const f of floats){
    ctx.globalAlpha = Math.max(0,f.life/0.8);
    ctx.fillStyle = f.color;
    ctx.font = "bold "+f.size+"px Arial";
    ctx.textAlign = "center";
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = "left";
}

function drawCombo(){
  if(comboFlash > 0 && comboImg.complete && comboImg.naturalWidth){
    const w = 230 + Math.sin(performance.now()/80)*6;
    const h = w*0.58;
    ctx.globalAlpha = Math.min(1, comboFlash*1.5);
    ctx.drawImage(comboImg, W/2-w/2, 122, w, h);
    ctx.globalAlpha = 1;
  }
}

function overlay(){
  ctx.fillStyle = "rgba(255,255,255,.92)";
  rr(28,144,W-56,470,28,true);
  ctx.strokeStyle = "rgba(15,108,189,.15)";
  ctx.lineWidth = 2;
  rr(28,144,W-56,470,28,false);
}

function buttonImage(x,y,w,h,fallbackColor,text){
  if(startBtnImg.complete && startBtnImg.naturalWidth){
    ctx.drawImage(startBtnImg, x, y, w, h);
  } else {
    ctx.fillStyle = fallbackColor;
    rr(x,y,w,h,16,true);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 23px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text,x+w/2,y+h/2+1);
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
  }
}

function wrap(text,cx,y,maxw,lh){
  const words = text.split(" ");
  let line = "", yy = y;
  for(let i=0;i<words.length;i++){
    const test = line + words[i] + " ";
    if(ctx.measureText(test).width > maxw && i>0){
      ctx.fillText(line.trim(),cx,yy);
      line = words[i] + " ";
      yy += lh;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(),cx,yy);
}

function drawStart(){
  overlay();

  if(logoDiris.complete && logoDiris.naturalWidth){
    const logoW = 250;
    const logoH = logoW * (logoDiris.height / logoDiris.width);
    ctx.drawImage(logoDiris, W/2 - logoW/2, 158, logoW, logoH);
  }

  if(dikyIdle.complete && dikyIdle.naturalWidth){
    ctx.drawImage(dikyIdle, W/2-46, 240, 92, 110);
  }

  ctx.fillStyle = "#0f6cbd";
  ctx.font = "bold 31px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Zancudo Kill", W/2, 365);

  ctx.font = "18px Arial";
  ctx.fillStyle = "#14324a";
  wrap("Dispara a los zancudos, evita trampas, junta power-ups y derrota al jefe final en SJL.", W/2, 400, 294, 28);

  ctx.font = "bold 18px Arial";
  ctx.fillStyle = "#2f9e44";
  
  buttonImage(W/2-112, 480, 224, 90, "#0f6cbd", "JUGAR");

  ctx.font = "15px Arial";
  ctx.fillStyle = "#5a748a";
  ctx.fillText("PC: mouse/flechas/espacio · Celular: toca", W/2, 600);

  ctx.textAlign = "left";
}

function drawEnd(){
  overlay();

  ctx.textAlign="center";

  // 👉 SI PIERDE
  if(player.hp<=0){

    if(dikyLose.complete && dikyLose.naturalWidth){
      ctx.drawImage(dikyLose,W/2-76,150,152,165);
    }else{
      ctx.drawImage(dikyShoot,W/2-76,150,152,165);
    }

    ctx.fillStyle="#d64545";
    ctx.font="bold 30px Arial";
    ctx.fillText("MISIÓN FALLIDA",W/2,344);

  }else{

    // 👉 SI GANA (AHORA CON D4)
    if(dikyHero.complete && dikyHero.naturalWidth){
      ctx.drawImage(dikyHero,W/2-76,150,152,165);
    }else{
      ctx.drawImage(dikyShoot,W/2-76,150,152,165);
    }

    ctx.fillStyle="#0f6cbd";
    ctx.font="bold 30px Arial";
    ctx.fillText("MISIÓN CUMPLIDA",W/2,344);
  }

  ctx.fillStyle="#14324a";
  ctx.font="bold 28px Arial";
  ctx.fillText("Puntaje: "+score,W/2,386);

  ctx.font="bold 20px Arial";
  ctx.fillStyle="#13a3b8";
  ctx.fillText(rankName(),W/2,420);

  ctx.font="18px Arial";
  ctx.fillStyle="#14324a";

  if(player.hp<=0){
    wrap("El dengue mata. Ante síntomas, acude a tu establecimiento de salud más cercano.",W/2,464,294,28);
  }else{
    wrap("¡Buen trabajo! Sin criaderos no hay dengue.",W/2,464,294,28);
  }

  buttonImage(W/2-120,522,240,96,"#13a3b8","JUGAR OTRA VEZ");

  ctx.textAlign="left";
}

function render(){
  ctx.save();
  if(shake > 0) ctx.translate(rand(-shake,shake),rand(-shake,shake));
  drawBG();
  drawEnemies();
  drawBoss();
  drawPickups();
  drawBullets();
  drawParticles();
  drawPlayer();
  drawFloats();
  if(state === "playing"){
    drawHUD();
    drawCombo();
  }
  ctx.restore();

  if(state === "start") drawStart();
  if(state === "end") drawEnd();
}

function loop(ts){
  const dt = Math.min(0.033,(ts-last)/1000 || 0);
  last = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function pos(e){
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x:(t.clientX-r.left)*(W/r.width),
    y:(t.clientY-r.top)*(H/r.height)
  };
}

function press(x,y){
  getAudio();
  startMusic();

  if(state === "start"){
    if(x >= W/2-112 && x <= W/2+112 && y >= 535 && y <= 625) resetGame();
    return;
  }

  if(state === "end"){
    if(x >= W/2-120 && x <= W/2+120 && y >= 590 && y <= 686) resetGame();
    return;
  }

  player.targetX = x;
  shoot();
}

canvas.addEventListener("mousedown", e=>{
  const p = pos(e);
  press(p.x,p.y);
});

canvas.addEventListener("mousemove", e=>{
  if(state === "playing") player.targetX = pos(e).x;
});

canvas.addEventListener("touchstart", e=>{
  const p = pos(e);
  press(p.x,p.y);
  e.preventDefault();
}, {passive:false});

canvas.addEventListener("touchmove", e=>{
  if(state === "playing") player.targetX = pos(e).x;
  e.preventDefault();
}, {passive:false});

window.addEventListener("keydown", e=>{
  keys[e.key] = true;
  if((state === "start" || state === "end") && e.key === "Enter"){
    getAudio();
    startMusic();
    resetGame();
  }
  if((e.key === " " || e.code === "Space") && state === "playing"){
    e.preventDefault();
    shoot();
  }
});

window.addEventListener("keyup", e=>{
  keys[e.key] = false;
});

last = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
